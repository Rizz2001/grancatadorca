<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>El Catador | Barinas</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* === VARIABLES ORIGINALES (RESPALDO) === */
        :root {
            --color-fondo: #0012E4;
            --color-texto: #ffffff;
            --color-texto-mutado: #a1a1aa;
            --azul-rey: #0A028F;
            --dorado: #F5A700;
            --plateado: #e2e8f0;
            --btn-fondo-base: rgba(15, 15, 17, 0.85);
            --borde-radio: 10px;
        }

        /* === RESETEO Y FONDO === */
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--color-fondo);
            color: var(--color-texto);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            position: relative;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('fondo.webp');
            background-size: cover;
            background-position: center;
            filter: blur(15px) brightness(0.2);
            z-index: -1;
        }

        main { width: 100%; max-width: 420px; }

        header { text-align: center; margin-bottom: 25px; }
        .logo { width: 130px; border-radius: 50%; border: 2px solid var(--dorado); box-shadow: 0 8px 20px rgba(0,0,0,0.5); }

        /* === ESTILO DE BOTONES (COMO EN TU RESPALDO) === */
        .btn-sede {
            width: 100%;
            background-color: var(--btn-fondo-base);
            color: var(--color-texto);
            border: none; padding: 18px 22px;
            border-radius: var(--borde-radio);
            font-family: inherit; font-size: 14px; font-weight: 600;
            letter-spacing: 1px; text-transform: uppercase;
            display: flex; align-items: center; justify-content: space-between;
            cursor: pointer; transition: all 0.3s ease;
            backdrop-filter: blur(10px);
            background-image: linear-gradient(var(--btn-fondo-base), var(--btn-fondo-base)), 
                              linear-gradient(135deg, var(--azul-rey) 0%, rgba(37, 99, 235, 0.2) 50%, var(--dorado) 100%);
            background-origin: border-box; background-clip: padding-box, border-box;
            border: 1px solid transparent; 
            margin-bottom: 16px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.4);
        }

        .btn-sede:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(37, 99, 235, 0.25); }
        .btn-sede.activo .flecha { transform: rotate(180deg); }
        .flecha { transition: transform 0.3s ease; }

        /* === CONTENEDOR DESPLEGABLE === */
        .desplegable {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.5s ease-out, opacity 0.5s ease;
            opacity: 0;
            width: 95%; margin: -10px auto 20px;
        }
        .desplegable.abierto { max-height: 2000px; opacity: 1; }

        /* === DASHBOARD E INVENTARIO (CIUDAD CATADOR) === */
        .premium-container {
            background: rgba(0, 0, 0, 0.6);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
        }

        .dashboard-mini {
            display: flex; justify-content: space-between;
            font-size: 11px; color: var(--dorado);
            margin-bottom: 15px; border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 10px;
        }

        .search-box {
            width: 100%; padding: 12px; border-radius: 8px;
            border: 1px solid var(--dorado); background: rgba(255,255,255,0.05);
            color: white; font-family: inherit; outline: none;
        }

        .item-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px; padding: 12px; margin-top: 10px;
            border-left: 4px solid var(--dorado);
            display: flex; justify-content: space-between; align-items: center;
        }

        .btn-add {
            background: var(--dorado); color: black; border: none;
            padding: 6px 12px; border-radius: 6px; font-weight: 700; cursor: pointer;
        }

        /* === CARRITO FLOTANTE === */
        #cart-btn {
            position: fixed; bottom: 30px; right: 20px;
            background: #25D366; width: 60px; height: 60px; border-radius: 50%;
            display: none; align-items: center; justify-content: center;
            border: 2px solid white; box-shadow: 0 10px 20px rgba(0,0,0,0.4); z-index: 1000;
        }
        .badge { position: absolute; top: 0; right: 0; background: red; color: white; border-radius: 50%; padding: 2px 7px; font-size: 11px; font-weight: bold; }

        footer { margin-top: auto; padding: 20px; text-align: center; font-size: 12px; color: var(--color-texto-mutado); }
    </style>
</head>
<body>

    <main>
        <header>
            <img src="logo.png" alt="Logo" class="logo">
            <h1 style="margin-top:10px;">EL CATADOR</h1>
            <p style="font-size: 11px; letter-spacing: 2px; color: var(--dorado); font-weight: 700;">BARINAS, VENEZUELA</p>
        </header>

        <button class="btn-sede" onclick="toggleSede('sedeGranCatador', this)">
            <div class="btn-content"><i class="fa-solid fa-crown"></i> <span>Gran Catador (Ciudad Catador)</span></div>
            <i class="fa-solid fa-chevron-down flecha"></i>
        </button>

        <div id="sedeGranCatador" class="desplegable">
            <div class="premium-container">
                <div class="dashboard-mini">
                    <span>Tasa BCV: <b id="tasaDisplay">Cargando...</b></span>
                    <span id="relojDisplay">00:00:00</span>
                </div>
                
                <input type="text" id="inputBusqueda" class="search-box" placeholder="¿Qué buscas en Ciudad Catador?">
                
                <div id="resultadosBusqueda" style="margin-top: 10px; max-height: 400px; overflow-y: auto;">
                    <p style="text-align:center; font-size: 11px; color: var(--color-texto-mutado);">Escribe para consultar existencia...</p>
                </div>
            </div>
        </div>

        <button class="btn-sede" onclick="toggleSede('sedeBodegon', this)">
            <div class="btn-content"><i class="fa-solid fa-store"></i> <span>Bodegón del Catador</span></div>
            <i class="fa-solid fa-chevron-down flecha"></i>
        </button>
        <div id="sedeBodegon" class="desplegable">
            <div class="premium-container" style="text-align: center;">
                <p style="font-size: 13px; margin-bottom: 10px;"><i class="fa-solid fa-location-dot"></i> Av. Cuatricentenaria</p>
                <a href="https://wa.me/584240000000" style="text-decoration: none; color: #25D366; font-weight: bold;">WhatsApp Sede <i class="fa-brands fa-whatsapp"></i></a>
            </div>
        </div>

        <button class="btn-sede" onclick="toggleSede('sedeDistriboca', this)">
            <div class="btn-content"><i class="fa-solid fa-boxes-stacked"></i> <span>Distriboca (Ventas al Mayor)</span></div>
            <i class="fa-solid fa-chevron-down flecha"></i>
        </button>
        <div id="sedeDistriboca" class="desplegable">
            <div class="premium-container" style="text-align: center;">
                <p style="font-size: 13px;">Atención exclusiva a mayoristas y comercios.</p>
                <a href="https://wa.me/584120000000" class="btn-add" style="display: inline-block; margin-top: 10px; text-decoration: none;">SOLICITAR LISTA MAYOR</a>
            </div>
        </div>

    </main>

    <div id="cart-btn" onclick="enviarPedido()">
        <i class="fa-solid fa-cart-shopping" style="color: white; font-size: 24px;"></i>
        <div id="cart-count" class="badge">0</div>
    </div>

    <footer>
        <div id="contenedorReloj">Barinas, Venezuela</div>
    </footer>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/fuse.js@6.6.2"></script>

    <script>
        let inventario = [];
        let fuse;
        let carrito = {};
        let tasaGlobal = 45.10;

        // 1. ANIMACIÓN DE SEDES
        function toggleSede(id, btn) {
            const el = document.getElementById(id);
            const isOpen = el.classList.contains('abierto');
            
            document.querySelectorAll('.desplegable').forEach(d => d.classList.remove('abierto'));
            document.querySelectorAll('.btn-sede').forEach(b => b.classList.remove('activo'));

            if (!isOpen) {
                el.classList.add('abierto');
                btn.classList.add('activo');
            }
        }

        // 2. CARGA DE ARCHIVOS (FOXDATA)
        async function cargarInventario() {
            try {
                // Cargamos precios y existencia
                const fetchCSV = (u) => new Promise(res => Papa.parse(u, { download: true, encoding: "latin-1", complete: (r) => res(r.data) }));
                const [pRaw, sRaw] = await Promise.all([
                    fetchCSV("Inventario Fisico general precio por unidad.csv"),
                    fetchCSV("inventario por existencia.csv")
                ]);

                let mapa = {};
                pRaw.forEach(r => {
                    if (r.length >= 5) {
                        let cod = r[r.length-4]?.trim();
                        let usd = r[r.length-1]?.trim();
                        if (cod && !isNaN(cod) && usd?.includes(',')) {
                            mapa[cod] = { nombre: r[r.length-3], precio: usd, bs: r[r.length-2] };
                        }
                    }
                });

                sRaw.forEach(r => {
                    let i = r.indexOf("Existencia");
                    if (i !== -1 && mapa[r[i+2]?.trim()]) mapa[r[i+2].trim()].stock = r[i+8];
                });

                inventario = Object.values(mapa);
                fuse = new Fuse(inventario, { keys: ['nombre'], threshold: 0.3 });

                // Tasa BCV
                const t = await fetch('https://ve.dolarapi.com/v1/dolares/oficial');
                const d = await t.json();
                tasaGlobal = d.promedio;
                document.getElementById('tasaDisplay').innerText = tasaGlobal + " Bs";

            } catch (e) { document.getElementById('tasaDisplay').innerText = "45.10 Bs"; }
        }

        // 3. BUSCADOR
        document.getElementById('inputBusqueda').addEventListener('input', (e) => {
            const val = e.target.value;
            const resCont = document.getElementById('resultadosBusqueda');
            if (val.length < 2) return;

            const resultados = fuse.search(val).slice(0, 10);
            resCont.innerHTML = "";

            resultados.forEach(obj => {
                const p = obj.item;
                const card = document.createElement('div');
                card.className = 'item-card';
                card.innerHTML = `
                    <div style="max-width: 75%;">
                        <div style="font-size: 12px; font-weight: 600;">${p.nombre}</div>
                        <div style="color: var(--dorado); font-weight: 700;">$${p.precio} <small style="font-size:9px; color:white;">(Stock: ${p.stock || '0,00'})</small></div>
                    </div>
                    <button class="btn-add" onclick="add('${p.nombre}', '${p.precio}')">+</button>
                `;
                resCont.appendChild(card);
            });
        });

        // 4. CARRITO
        function add(n, p) {
            if (carrito[n]) carrito[n].cant++;
            else carrito[n] = { precio: parseFloat(p.replace(',','.')), display: p, cant: 1 };
            
            const count = Object.values(carrito).reduce((a, b) => a + b.cant, 0);
            document.getElementById('cart-count').innerText = count;
            document.getElementById('cart-btn').style.display = 'flex';
        }

        function enviarPedido() {
            let m = "Hola Gran Catador! 👋 Quisiera consultar estos productos de Ciudad Catador:%0A%0A";
            let total = 0;
            for (let n in carrito) {
                m += `• ${carrito[n].cant}x ${n} ($${carrito[n].display})%0A`;
                total += (carrito[n].precio * carrito[n].cant);
            }
            m += `%0A*Total:* $${total.toFixed(2)} (Tasa: ${tasaGlobal})`;
            window.open(`https://wa.me/584245496366?text=${m}`);
        }

        // 5. RELOJ
        setInterval(() => {
            const n = new Date();
            document.getElementById('relojDisplay').innerText = n.toLocaleTimeString('es-VE', { hour12: true });
        }, 1000);

        window.onload = cargarInventario;
    </script>
</body>
</html>
