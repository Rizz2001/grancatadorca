<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>El Catador | Barinas</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* === VARIABLES ORIGINALES === */
        :root {
            --color-fondo: #0012E4;
            --color-texto: #ffffff;
            --color-texto-mutado: #a1a1aa;
            --azul-rey: #0A028F;
            --dorado: #F5A700;
            --plateado: #e2e8f0;
            --btn-fondo-base: rgba(15, 15, 17, 0.85);
            --borde-radio: 10px;
        }

        /* === RESETEO Y FIJACIÓN DE PANTALLA === */
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--color-fondo);
            color: var(--color-texto);
            min-height: 100vh;
            width: 100%;
            overflow-x: hidden; /* Evita el movimiento lateral de la página */
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 15px;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('fondo.webp');
            background-size: cover;
            background-position: center;
            filter: blur(15px) brightness(0.2);
            z-index: -1;
        }

        main { width: 100%; max-width: 420px; position: relative; }

        header { text-align: center; margin-bottom: 25px; }
        .logo { width: 120px; border-radius: 50%; border: 2px solid var(--dorado); box-shadow: 0 8px 20px rgba(0,0,0,0.5); }

        /* === ESTILO DE BOTONES SEDES (TU DISEÑO) === */
        .btn-sede {
            width: 100%;
            background-color: var(--btn-fondo-base);
            color: var(--color-texto);
            border: none; padding: 18px 20px;
            border-radius: var(--borde-radio);
            font-size: 14px; font-weight: 600;
            letter-spacing: 1px; text-transform: uppercase;
            display: flex; align-items: center; justify-content: space-between;
            cursor: pointer; transition: all 0.3s ease;
            backdrop-filter: blur(10px);
            background-image: linear-gradient(var(--btn-fondo-base), var(--btn-fondo-base)), 
                              linear-gradient(135deg, var(--azul-rey) 0%, rgba(37, 99, 235, 0.2) 50%, var(--dorado) 100%);
            background-origin: border-box; background-clip: padding-box, border-box;
            border: 1px solid transparent; margin-bottom: 12px;
        }

        .btn-sede.activo .flecha { transform: rotate(180deg); }
        .flecha { transition: transform 0.3s ease; }

        /* === CONTENEDORES DESPLEGABLES === */
        .desplegable {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.5s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.3s;
            opacity: 0;
            width: 100%;
        }
        .desplegable.abierto { max-height: 3000px; opacity: 1; margin-bottom: 20px; }

        /* === MOTOR DE BÚSQUEDA PROFESIONAL === */
        .search-card {
            background: rgba(0, 0, 0, 0.6);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            width: 100%;
        }

        /* Categorías con Scroll Lateral Fijo */
        .cats-scroll {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding-bottom: 15px;
            margin-bottom: 15px;
            scrollbar-width: none; /* Oculta scroll en Firefox */
            -webkit-overflow-scrolling: touch; /* Scroll suave en iOS */
        }
        .cats-scroll::-webkit-scrollbar { display: none; } /* Oculta scroll en Chrome/Safari */

        .cat-tag {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 7px 15px; border-radius: 20px;
            font-size: 10px; font-weight: 600; color: var(--plateado);
            white-space: nowrap; cursor: pointer; transition: 0.3s;
        }
        .cat-tag.activo { background: var(--dorado); color: black; border-color: var(--dorado); }

        .search-input-wrapper { position: relative; margin-bottom: 15px; }
        .search-input-wrapper i { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: var(--dorado); }
        
        #inputBusqueda {
            width: 100%; padding: 12px 12px 12px 40px; border-radius: 8px;
            border: 1px solid var(--dorado); background: rgba(0,0,0,0.3);
            color: white; font-family: inherit; outline: none; font-size: 14px;
        }

        /* Contenedor de Resultados con Scroll Vertical Aislado */
        .results-box {
            max-height: 450px; /* Altura fija para evitar que la página se mueva */
            overflow-y: auto;
            overflow-x: hidden; /* Bloqueo total lateral */
            padding-right: 5px;
        }

        .item-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px; padding: 12px; margin-bottom: 10px;
            border-left: 4px solid var(--dorado);
            display: flex; justify-content: space-between; align-items: center;
            animation: fadeIn 0.3s ease;
        }

        .item-info b { display: block; font-size: 12px; margin-bottom: 3px; }
        .item-info span { color: var(--dorado); font-weight: 700; font-size: 14px; }
        .item-info small { color: var(--color-texto-mutado); font-size: 10px; display: block; }

        .btn-add {
            background: var(--dorado); color: black; border: none;
            width: 35px; height: 35px; border-radius: 8px;
            font-size: 18px; font-weight: bold; cursor: pointer;
        }

        /* === CARRITO Y MODAL === */
        #cart-floating {
            position: fixed; bottom: 30px; right: 20px;
            background: #25D366; width: 60px; height: 60px; border-radius: 50%;
            display: none; align-items: center; justify-content: center;
            border: 2px solid white; box-shadow: 0 10px 25px rgba(0,0,0,0.5); z-index: 1000;
        }
        .badge { position: absolute; top: 0; right: 0; background: red; color: white; border-radius: 50%; width: 22px; height: 22px; font-size: 11px; display: flex; align-items: center; justify-content: center; font-weight: bold; border: 2px solid white; }

        #modal-carrito {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 2000;
            display: none; flex-direction: column; padding: 25px;
            overflow-y: auto;
        }

        /* === ANIMACIONES === */
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        footer { margin-top: auto; padding: 30px; text-align: center; }
        .reloj-vivo { display: inline-block; background: rgba(0,0,0,0.5); padding: 10px 20px; border-radius: 20px; font-size: 11px; color: var(--color-texto-mutado); border: 1px solid var(--glass-border); }
    </style>
</head>
<body>

    <div id="modal-carrito">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h2 style="color:var(--dorado)">Tu Pedido</h2>
            <i class="fa-solid fa-xmark" onclick="cerrarCarrito()" style="font-size: 26px; cursor: pointer;"></i>
        </div>
        <div id="lista-carrito" style="flex-grow: 1;"></div>
        <div style="background: rgba(255,255,255,0.05); padding: 20px; border-radius: 12px; margin-top: 20px; text-align: right;">
            <div style="font-size: 18px;">Total USD: <b id="cart-total-usd" style="color:var(--dorado)">$0.00</b></div>
            <div style="font-size: 13px; color: var(--color-texto-mutado); margin-bottom: 15px;">Total Bs: <span id="cart-total-bs">0.00</span></div>
            <button onclick="enviarPedido()" style="width: 100%; background: #25D366; color: white; border: none; padding: 15px; border-radius: 10px; font-weight: bold; cursor: pointer;">
                <i class="fa-brands fa-whatsapp"></i> ENVIAR A WHATSAPP
            </button>
        </div>
    </div>

    <div id="cart-floating" onclick="abrirCarrito()">
        <i class="fa-solid fa-cart-shopping" style="color: white; font-size: 24px;"></i>
        <div class="badge" id="cart-count">0</div>
    </div>

    <main>
        <header>
            <img src="logo.png" alt="Logo" class="logo">
            <h1 style="margin-top:10px; font-size: 22px;">EL CATADOR</h1>
            <p style="font-size: 10px; letter-spacing: 2px; color: var(--dorado); font-weight: 700; text-transform: uppercase;">Barinas, Venezuela</p>
        </header>

        <button class="btn-sede" onclick="toggleMenu('sede-gran-catador', this)">
            <div style="display: flex; align-items: center; gap: 12px;">
                <i class="fa-solid fa-crown"></i>
                <span>Gran Catador (Ciudad Catador)</span>
            </div>
            <i class="fa-solid fa-chevron-down flecha"></i>
        </button>

        <div id="sede-gran-catador" class="desplegable">
            <div class="search-card">
                <div style="display: flex; justify-content: space-between; font-size: 10px; color: var(--dorado); margin-bottom: 15px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 8px;">
                    <span>Tasa BCV: <b id="tasa-val">Cargando...</b></span>
                    <span id="reloj-mini">00:00:00</span>
                </div>

                <div id="cat-container" class="cats-scroll">
                    <span class="cat-tag activo" onclick="filtrarCategoria('TODOS', this)">Todos</span>
                </div>
                
                <div class="search-input-wrapper">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    <input type="text" id="inputBusqueda" placeholder="Buscar producto...">
                </div>
                
                <div id="results-box" class="results-box">
                    <p style="text-align:center; font-size: 11px; color: var(--color-texto-mutado); padding: 20px;">Cargando inventario FoxData...</p>
                </div>
            </div>
        </div>

        <button class="btn-sede" onclick="toggleMenu('sede-bodegon', this)">
            <div style="display: flex; align-items: center; gap: 12px;">
                <i class="fa-solid fa-store"></i>
                <span>Bodegón del Catador</span>
            </div>
            <i class="fa-solid fa-chevron-down flecha"></i>
        </button>
        <div id="sede-bodegon" class="desplegable">
            <div class="search-card" style="text-align: center;">
                <p style="font-size: 12px; margin-bottom: 10px;"><i class="fa-solid fa-location-dot"></i> Av. Cuatricentenaria</p>
                <a href="https://wa.me/584245496366" class="btn-sede" style="padding: 12px; font-size: 11px; margin-bottom: 0;">WhatsApp Sede</a>
            </div>
        </div>

        <button class="btn-sede" onclick="toggleMenu('sede-distriboca', this)">
            <div style="display: flex; align-items: center; gap: 12px;">
                <i class="fa-solid fa-boxes-stacked"></i>
                <span>Distriboca (Ventas al Mayor)</span>
            </div>
            <i class="fa-solid fa-chevron-down flecha"></i>
        </button>
        <div id="sede-distriboca" class="desplegable">
            <div class="search-card" style="text-align: center;">
                <p style="font-size: 11px; color: var(--color-texto-mutado);">Atención exclusiva a mayoristas.</p>
                <a href="https://wa.me/584245496366" class="btn-sede" style="background: var(--azul-rey); margin-top: 10px; font-size: 11px; margin-bottom: 0;">Solicitar Lista Mayor</a>
            </div>
        </div>

    </main>

    <footer>
        <div class="reloj-vivo" id="reloj-footer">Barinas, Venezuela</div>
    </footer>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/fuse.js@6.6.2"></script>

    <script>
        let db = [];
        let fuse;
        let carrito = {};
        let tasa = 45.10;

        function toggleMenu(id, btn) {
            const el = document.getElementById(id);
            const isOpen = el.classList.contains('abierto');
            document.querySelectorAll('.desplegable').forEach(d => d.classList.remove('abierto'));
            document.querySelectorAll('.btn-sede').forEach(b => b.classList.remove('activo'));
            if (!isOpen) { el.classList.add('abierto'); btn.classList.add('activo'); }
        }

        async function init() {
            try {
                const parse = (u) => new Promise(r => Papa.parse(u, { download: true, encoding: "latin-1", complete: (res) => r(res.data) }));
                const [precios, existencias] = await Promise.all([
                    parse("Inventario Fisico general precio por unidad.csv"),
                    parse("inventario por existencia.csv")
                ]);

                let mapa = {};
                precios.forEach(r => {
                    if (r.length >= 5) {
                        let c = r[r.length-4]?.trim();
                        let p = r[r.length-1]?.trim();
                        if (c && !isNaN(c) && p?.includes(',')) {
                            mapa[c] = { n: r[r.length-3].trim(), cat: r[r.length-5].trim(), ps: p, pn: parseFloat(p.replace('.','').replace(',','.')) };
                        }
                    }
                });

                existencias.forEach(r => {
                    let i = r.indexOf("Existencia");
                    if (i !== -1 && mapa[r[i+2]?.trim()]) mapa[r[i+2].trim()].st = r[i+8].trim();
                });

                db = Object.values(mapa).map(p => ({ ...p, st: p.st || "0,00" }));
                
                const cats = [...new Set(db.map(p => p.cat))].filter(c => c);
                const cont = document.getElementById('cat-container');
                cats.forEach(c => {
                    const s = document.createElement('span'); s.className = 'cat-tag'; s.innerText = c;
                    s.onclick = (e) => {
                        document.querySelectorAll('.cat-tag').forEach(b => b.classList.remove('activo'));
                        s.classList.add('activo');
                        render(db.filter(p => p.cat === c));
                    };
                    cont.appendChild(s);
                });

                fuse = new Fuse(db, { keys: ['n'], threshold: 0.3 });
                document.getElementById('results-box').innerHTML = '<p style="text-align:center; font-size:11px; color:var(--dorado)">Listo para buscar.</p>';

                const tRes = await fetch('https://ve.dolarapi.com/v1/dolares/oficial');
                const tData = await tRes.json();
                tasa = tData.promedio;
                document.getElementById('tasa-val').innerText = tasa + " Bs";
            } catch (e) { document.getElementById('tasa-val').innerText = "45.10 Bs"; }
        }

        document.getElementById('inputBusqueda').oninput = (e) => {
            const v = e.target.value;
            if (v.length < 2) return;
            document.querySelectorAll('.cat-tag').forEach(b => b.classList.remove('activo'));
            render(fuse.search(v).slice(0, 15).map(r => r.item));
        };

        function render(lista) {
            const box = document.getElementById('results-box');
            box.innerHTML = lista.length ? "" : '<p style="text-align:center; font-size:11px; padding:20px;">No encontrado</p>';
            lista.forEach(p => {
                const d = document.createElement('div');
                d.className = 'item-card';
                d.innerHTML = `
                    <div class="item-info">
                        <b>${p.n}</b>
                        <span>$${p.ps}</span>
                        <small>Stock: ${p.st}</small>
                    </div>
                    <button class="btn-add" onclick="add('${p.n}', '${p.ps}', ${p.pn})">+</button>
                `;
                box.appendChild(d);
            });
        }

        function add(n, ps, pn) {
            if (carrito[n]) carrito[n].c++;
            else carrito[n] = { ps, pn, c: 1 };
            updateCart();
        }

        function updateCart() {
            let tc = 0, tusd = 0;
            const list = document.getElementById('lista-carrito');
            list.innerHTML = "";
            for (let n in carrito) {
                const i = carrito[n];
                tc += i.c; tusd += (i.pn * i.c);
                list.innerHTML += `
                    <div class="item-card">
                        <div class="item-info"><b>${n}</b><small>$${i.ps}</small></div>
                        <div style="display:flex; align-items:center; gap:10px;">
                            <button class="btn-add" style="width:25px;height:25px;font-size:14px" onclick="change('${n}',-1)">-</button>
                            <span>${i.c}</span>
                            <button class="btn-add" style="width:25px;height:25px;font-size:14px" onclick="change('${n}',1)">+</button>
                        </div>
                    </div>`;
            }
            document.getElementById('cart-count').innerText = tc;
            document.getElementById('cart-floating').style.display = tc > 0 ? 'flex' : 'none';
            document.getElementById('cart-total-usd').innerText = `$${tusd.toFixed(2)}`;
            document.getElementById('cart-total-bs').innerText = (tusd * tasa).toLocaleString('es-VE') + " Bs";
        }

        function change(n, d) {
            carrito[n].c += d;
            if (carrito[n].c <= 0) delete carrito[n];
            updateCart();
        }

        function abrirCarrito() { document.getElementById('modal-carrito').style.display = 'flex'; }
        function cerrarCarrito() { document.getElementById('modal-carrito').style.display = 'none'; }

        function enviarPedido() {
            let m = "Hola Gran Catador! 👋 Pedido Ciudad Catador:%0A%0A";
            for (let n in carrito) m += `• *${carrito[n].c}x* ${n} ($${carrito[n].ps})%0A`;
            m += `%0A*Total:* ${document.getElementById('cart-total-usd').innerText} (Tasa: ${tasa})`;
            window.open(`https://wa.me/584245496366?text=${m}`, '_blank');
        }

        setInterval(() => {
            const n = new Date();
            const h = n.toLocaleTimeString('es-VE', { hour12: true });
            document.getElementById('reloj-mini').innerText = h;
            document.getElementById('reloj-footer').innerText = n.toLocaleDateString('es-VE', { weekday: 'long', day: 'numeric', month: 'long' }) + " | " + h;
        }, 1000);

        window.onload = init;
    </script>
</body>
</html>
